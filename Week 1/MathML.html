<html>
<body>
    <p>Here is a simple fraction: 
        <math xmlns="https://www.w3.org/1998/Math/MathML/">
            <mfrac>
                <mn>1</mn>
                <mn>2</mn>
            </mfrac>
        </math>
    </p>
    <br><hr>
    <p>And here is the Pythagorean theorem:</p>
        <math xmlns="https://www.w3.org/1998/Math/MathML/">
            <mrow>
                <msup><mi>a</mi><mn>2</mn></msup>
                <mo>+</mo>
                <msup><mi>b</mi><mn>2</mn></msup>
                <mo>=</mo>
                <msup><mi>c</mi><mn>2</mn></msup>
            </mrow>
        </math>
</body>
</html>
